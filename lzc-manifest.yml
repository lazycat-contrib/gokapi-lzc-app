name: gokapi
package: community.lazycat.app.gokapi
version: 2.1.0
min_os_version: 1.3.8
description: "Lightweight, self-hosted file sharing server with AWS S3 support and customizable upload settings"
license: https://choosealicense.com/licenses/mit/
homepage: https://github.com/Forceu/Gokapi
author: Forceu

application:
  subdomain: gokapi
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://gokapi:53842/
  background_task: false

services:
  gokapi:
    image: docker.1ms.run/f0rc3/gokapi:v2.1.0
    binds:
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/config:/app/config
    environment:
      # 基础配置
      - TZ={{.U.timezone}}
      - GOKAPI_DATA_DIR=/app/data
      - GOKAPI_CONFIG_DIR=/app/config
      - GOKAPI_PORT=53842

      # ID 长度配置
      - GOKAPI_LENGTH_ID={{.U.length_id}}
      - GOKAPI_LENGTH_HOTLINK_ID={{.U.length_hotlink_id}}

      # 分块和上传配置
      - GOKAPI_CHUNK_SIZE_MB={{.U.chunk_size_mb}}
      - GOKAPI_MAX_FILESIZE={{.U.max_filesize}}
      - GOKAPI_MAX_MEMORY_UPLOAD={{.U.max_memory_upload}}
      - GOKAPI_MAX_PARALLEL_UPLOADS={{.U.max_parallel_uploads}}

      # 其他标志
      - GOKAPI_DISABLE_CORS_CHECK={{.U.disable_cors_check}}
      - GOKAPI_ENABLE_HOTLINK_VIDEOS={{.U.enable_hotlink_videos}}

locales:
  en:
    name: "Gokapi"
    description: "Lightweight, self-hosted file sharing server with AWS S3 support and customizable upload settings"
  zh:
    name: "Gokapi"
    description: "轻量级自托管文件分享服务器，支持 AWS S3 存储和自定义上传配置"
