# Gokapi 应用部署参数配置
# 参数 ID 使用小写加下划线格式，提供更好的可读性

params:
  # ============================================
  # 必填参数：时区配置
  # ============================================
  - id: timezone
    type: string
    name: "timezone"
    description: "Timezone for the application (e.g., UTC, Asia/Shanghai, Europe/Berlin)"
    default_value: "Asia/Shanghai"
    optional: false
    placeholder: "UTC"

  # ============================================
  # 可选参数：AWS S3 存储配置
  # ============================================
  - id: aws_bucket
    type: string
    name: "aws s3 bucket"
    description: "AWS S3 bucket name for file storage (optional)"
    default_value: ""
    optional: true
    placeholder: "my-gokapi-bucket"

  - id: aws_region
    type: string
    name: "aws region"
    description: "AWS S3 region (e.g., us-east-1, ap-northeast-1)"
    default_value: ""
    optional: true
    placeholder: "us-east-1"

  - id: aws_key
    type: string
    name: "aws access key"
    description: "AWS access key ID for S3 authentication"
    default_value: ""
    optional: true
    placeholder: "AKIAIOSFODNN7EXAMPLE"

  - id: aws_key_secret
    type: password
    name: "aws secret key"
    description: "AWS secret access key for S3 authentication"
    default_value: ""
    optional: true
    placeholder: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

  - id: aws_endpoint
    type: string
    name: "aws s3 endpoint"
    description: "Custom S3 endpoint URL (for S3-compatible services)"
    default_value: ""
    optional: true
    placeholder: "https://s3.example.com"

  # ============================================
  # 可选参数：ID 长度配置
  # ============================================
  - id: length_id
    type: number
    name: "file id length"
    description: "Length of generated file IDs"
    default_value: 15
    optional: true
    min: 10
    max: 50

  - id: length_hotlink_id
    type: number
    name: "hotlink id length"
    description: "Length of generated hotlink IDs"
    default_value: 40
    optional: true
    min: 20
    max: 100

  # ============================================
  # 可选参数：分块和上传配置
  # ============================================
  - id: chunk_size_mb
    type: number
    name: "chunk size (mb)"
    description: "Size of upload chunks in megabytes"
    default_value: 45
    optional: true
    min: 1
    max: 500

  - id: max_filesize
    type: number
    name: "max file size (mb)"
    description: "Maximum file size allowed for upload in megabytes"
    default_value: 102400
    optional: true
    min: 1
    max: 1048576

  - id: max_memory_upload
    type: number
    name: "max memory upload (mb)"
    description: "Maximum memory used for upload processing in megabytes"
    default_value: 50
    optional: true
    min: 10
    max: 1024

  - id: max_parallel_uploads
    type: number
    name: "max parallel uploads"
    description: "Maximum number of parallel uploads allowed"
    default_value: 3
    optional: true
    min: 1
    max: 20

  # ============================================
  # 可选参数：其他功能标志
  # ============================================
  - id: disable_cors_check
    type: bool
    name: "disable cors check"
    description: "Disable CORS (Cross-Origin Resource Sharing) security check"
    default_value: true
    optional: true

  - id: enable_hotlink_videos
    type: bool
    name: "enable hotlink videos"
    description: "Enable video hotlinking functionality"
    default_value: false
    optional: true

# ============================================
# 多语言支持：中文翻译
# ============================================
locales:
